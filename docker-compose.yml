services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: loops
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - loops-dev-postgres:/var/lib/postgresql/data

volumes:
  loops-dev-postgres:
    name: loops-dev-postgres
