services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-loops}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - loops-prod-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-loops}"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-loops}?schema=public
      LOOPS_SESSION_COOKIE: ${LOOPS_SESSION_COOKIE:-loops_session}
    ports:
      - "3000:3000"
    command: ["sh", "-c", "npx prisma db push && npm run start"]

volumes:
  loops-prod-postgres:
    name: loops-prod-postgres
